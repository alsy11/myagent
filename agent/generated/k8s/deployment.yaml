---
apiVersion: v1
kind: Namespace
metadata:
  name: space-fractions

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: space-fractions-app
  namespace: space-fractions
  labels:
    app: space-fractions
    component: app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: space-fractions
      component: app
  template:
    metadata:
      labels:
        app: space-fractions
        component: app
    spec:
      containers:
        - name: app
          image: space-fractions-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: space-fractions-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: space-fractions-secrets
                  key: redis-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: space-fractions-secrets
                  key: jwt-secret
            - name: JWT_EXPIRES_IN
              value: "24h"
          resources:
            requests:
              memory: "128Mi"
              cpu: "250m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: space-fractions-app-service
  namespace: space-fractions
spec:
  selector:
    app: space-fractions
    component: app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: space-fractions-db
  namespace: space-fractions
  labels:
    app: space-fractions
    component: db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: space-fractions
      component: db
  template:
    metadata:
      labels:
        app: space-fractions
        component: db
    spec:
      containers:
        - name: postgres
          image: postgres:14-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "spacefractions"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: space-fractions-secrets
                  key: db-password
            - name: POSTGRES_DB
              value: "spacefractions"
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: space-fractions-pvc
        - name: init-sql
          configMap:
            name: space-fractions-init-sql

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: space-fractions-pvc
  namespace: space-fractions
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
apiVersion: v1
kind: Service
metadata:
  name: space-fractions-db-service
  namespace: space-fractions
spec:
  selector:
    app: space-fractions
    component: db
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: space-fractions-redis
  namespace: space-fractions
  labels:
    app: space-fractions
    component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: space-fractions
      component: redis
  template:
    metadata:
      labels:
        app: space-fractions
        component: redis
    spec:
      containers:
        - name: redis
          image: redis:6-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "250m"

---
apiVersion: v1
kind: Service
metadata:
  name: space-fractions-redis-service
  namespace: space-fractions
spec:
  selector:
    app: space-fractions
    component: redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
  type: ClusterIP

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: space-fractions-init-sql
  namespace: space-fractions
data:
  init.sql: |
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";

    CREATE TABLE IF NOT EXISTS users (
      id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
      username VARCHAR(100) UNIQUE NOT NULL,
      password_hash VARCHAR(255) NOT NULL,
      display_name VARCHAR(200),
      role VARCHAR(20) NOT NULL DEFAULT 'student' CHECK (role IN ('student', 'admin')),
      created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW(),
      updated_at TIMESTAMP WITH TIME ZONE DEFAULT NOW()
    );

    CREATE TABLE IF NOT EXISTS questions (
      id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
      prompt TEXT NOT NULL,
      options JSONB NOT NULL,
      correct_answer VARCHAR(255) NOT NULL,
      difficulty VARCHAR(20) NOT NULL DEFAULT 'easy' CHECK (difficulty IN ('easy', 'medium', 'hard')),
      created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW(),
      updated_at TIMESTAMP WITH TIME ZONE DEFAULT NOW()
    );

    CREATE TABLE IF NOT EXISTS games (
      id UUID PRIMARY KEY,
      user_id UUID NOT NULL REFERENCES users(id) ON DELETE CASCADE,
      game_state JSONB NOT NULL,
      created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW(),
      updated_at TIMESTAMP WITH TIME ZONE DEFAULT NOW()
    );

    CREATE INDEX IF NOT EXISTS idx_games_user_id ON games(user_id);

    INSERT INTO users (username, password_hash, display_name, role)
    VALUES ('admin', '$2a$10$N9qo8uLOickgx2ZMRZoMyeIjZAgcfl7p92ldGxad68LJZdL17lhWy', 'Admin', 'admin')
    ON CONFLICT (username) DO NOTHING;

    INSERT INTO questions (prompt, options, correct_answer, difficulty) VALUES
    ('What is 1/2 + 1/4?', '["3/4", "2/6", "1/6", "2/4"]', '3/4', 'easy'),
    ('What is 2/3 of 12?', '["6", "8", "4", "10"]', '8', 'easy'),
    ('Which fraction is equivalent to 3/5?', '["6/10", "3/10", "6/5", "9/15"]', '6/10', 'easy'),
    ('What is 3/4 - 1/2?', '["1/4", "2/2", "1/2", "2/4"]', '1/4', 'medium'),
    ('Simplify: 8/12', '["2/3", "4/6", "1/3", "3/4"]', '2/3', 'medium'),
    ('What is 2/5 + 3/10?', '["7/10", "5/15", "1/2", "5/10"]', '7/10', 'medium'),
    ('Which is larger: 5/8 or 3/5?', '["5/8", "3/5", "They are equal", "Cannot determine"]', '5/8', 'hard'),
    ('What is 1/3 x 3/4?', '["1/4", "3/12", "1/3", "3/7"]', '1/4', 'hard'),
    ('What is 3/4 / 1/2?', '["1 1/2", "3/8", "3/2", "1/2"]', '1 1/2', 'hard'),
    ('Order from smallest to largest: 1/3, 2/5, 3/10', '["3/10, 1/3, 2/5", "1/3, 2/5, 3/10", "2/5, 1/3, 3/10", "3/10, 2/5, 1/3"]', '3/10, 1/3, 2/5', 'hard');

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: space-fractions-ingress
  namespace: space-fractions
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: space-fractions.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: space-fractions-app-service
                port:
                  number: 80
